spring:
  application:
    name: spring-modulith
  datasource:
    url: jdbc:h2:mem:modulith;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
  modulith:
    events:
      republish-outstanding-events-on-restart: true
      completion-mode: delete
      staleness:
        published: 1m
        processing: 1m
        resubmitted: 5m
  kafka:
    bootstrap-servers: localhost:29092

logging:
  level:
    com.study.springmodulith: debug
