spring:
  application:
    name: spring-monitoring
  datasource:
    url: jdbc:mysql://localhost:3306/monitoring?createDatabaseIfNotExist=true
    username: root
    password: "111111"
    hikari:
      maximum-pool-size: 30
      connection-timeout: 3000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      "[hibernate.show_sql]": false
      "[hibernate.format_sql]": false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: read_only
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces

pyroscope:
  server-address: http://localhost:4040
