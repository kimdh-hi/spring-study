global:
  scrape_interval: 5s
  external_labels:
    cluster: local

scrape_configs:
  - job_name: spring-monitoring
    metrics_path: /actuator/prometheus
    static_configs:
      # locally-run Spring app (./gradlew bootRun on the host)
      - targets: [ "host.docker.internal:8080" ]

# forward all scraped samples to Mimir for long-term storage
remote_write:
  - url: http://mimir:9009/api/v1/push
    headers:
      X-Scope-OrgID: anonymous
