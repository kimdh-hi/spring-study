global:
  scrape_interval: 5s
  external_labels:
    cluster: local

scrape_configs:
  - job_name: spring-monitoring
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "host.docker.internal:8080" ]

remote_write:
  - url: http://mimir:9009/api/v1/push
    headers:
      X-Scope-OrgID: anonymous
